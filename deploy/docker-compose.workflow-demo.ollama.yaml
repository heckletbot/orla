# Ollama variant of the workflow demo stack (laptop-friendly, no GPU required).
# Uses OpenAI-compatible API at http://ollama:11434/v1.
# Models are pulled automatically on first start.
# Run from repo root:
#   docker compose -f deploy/docker-compose.workflow-demo.ollama.yaml up -d
#   BACKEND=ollama go run ./examples/workflow_demo/cmd/workflow_demo
# Then: docker compose -f deploy/docker-compose.workflow-demo.ollama.yaml down

services:
  ollama:
    image: ollama/ollama:latest
    container_name: workflow-demo-ollama
    ports:
      - "11434:11434"
    volumes:
      - workflow_demo_ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: workflow-demo-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull ${OLLAMA_LIGHT_MODEL:-qwen3:0.6b}
        ollama pull ${OLLAMA_HEAVY_MODEL:-qwen3:1.7b}
    restart: "no"

  orla:
    build:
      context: ..
      dockerfile: Dockerfile
    image: orla:latest
    container_name: workflow-demo-orla-ollama
    ports:
      - "8081:8081"
    command: ["serve", "--config", "/config/orla.yaml"]
    volumes:
      - ./orla-ollama.yaml:/config/orla.yaml:ro
    depends_on:
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  workflow_demo_ollama_data: {}
