# Minimal stack for the multi-agent workflow demo (customer support triage + resolution).
# Run from repo root:
#   docker compose -f deploy/docker-compose.workflow-demo.yaml up -d
#   go run ./examples/workflow_demo/cmd/workflow_demo
# Then: docker compose -f deploy/docker-compose.workflow-demo.yaml down
# Uses a separate project from swebench-lite to avoid network conflicts.
# Requires GPU for SGLang.

services:
  sglang:
    image: lmsysorg/sglang:latest
    container_name: workflow-demo-sglang
    ports:
      - "30000:30000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - workflow_demo_sglang_cache:/root/.cache/huggingface
    entrypoint: ["python3", "-m", "sglang.launch_server"]
    command:
      - "--model-path"
      - "${SGLANG_MODEL:-Qwen/Qwen3-8B}"
      - "--tool-call-parser"
      - "qwen"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "30000"
      - "--mem-fraction-static"
      - "${SGLANG_MEM_FRACTION:-0.60}"
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:30000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  sglang-light:
    image: lmsysorg/sglang:latest
    container_name: workflow-demo-sglang-light
    ports:
      - "30001:30000"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - workflow_demo_sglang_cache:/root/.cache/huggingface
    entrypoint: ["python3", "-m", "sglang.launch_server"]
    command:
      - "--model-path"
      - "${SGLANG_LIGHT_MODEL:-Qwen/Qwen3-4B-Instruct-2507}"
      - "--tool-call-parser"
      - "qwen"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "30000"
      - "--mem-fraction-static"
      - "${SGLANG_LIGHT_MEM_FRACTION:-0.35}"
    ulimits:
      memlock: -1
      stack: 67108864
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:30000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  orla:
    build:
      context: ..
      dockerfile: Dockerfile
    image: orla:latest
    container_name: workflow-demo-orla
    ports:
      - "8081:8081"
    command: ["serve", "--config", "/config/orla.yaml"]
    volumes:
      - ./orla-sglang.yaml:/config/orla.yaml:ro
    depends_on:
      sglang:
        condition: service_healthy
      sglang-light:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  workflow_demo_sglang_cache: {}
