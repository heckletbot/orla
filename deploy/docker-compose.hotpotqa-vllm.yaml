# HotpotQA on-prem benchmark with vLLM (strong + cheap models on separate GPUs).
#
# Requires 2x GPUs with >=16GB VRAM each (tested on 2x NVIDIA RTX PRO 6000
# Blackwell, 96GB each).
#
# Start:
#   docker compose -f deploy/docker-compose.hotpotqa-vllm.yaml up -d
#
# Then run the benchmark from pyorla/:
#   uv run python examples/hotpotqa_routing_onprem/run.py --mode baseline --limit 100
#   uv run python examples/hotpotqa_routing_onprem/run.py --mode routed --limit 100
#   uv run python examples/hotpotqa_routing_onprem/run.py --mode all-cheap --limit 100
#
# Stop:
#   docker compose -f deploy/docker-compose.hotpotqa-vllm.yaml down

services:
  vllm-strong:
    image: vllm/vllm-openai:latest
    container_name: hotpotqa-vllm-strong
    ports:
      - "8000:8000"
    volumes:
      - hotpotqa_vllm_cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command:
      - "--model"
      - "${VLLM_STRONG_MODEL:-Qwen/Qwen3-32B}"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--gpu-memory-utilization"
      - "${VLLM_STRONG_GPU_UTIL:-0.90}"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-8192}"
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 180s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  vllm-cheap:
    image: vllm/vllm-openai:latest
    container_name: hotpotqa-vllm-cheap
    ports:
      - "8001:8000"
    volumes:
      - hotpotqa_vllm_cache:/root/.cache/huggingface
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    command:
      - "--model"
      - "${VLLM_CHEAP_MODEL:-Qwen/Qwen3-4B-Instruct-2507}"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--gpu-memory-utilization"
      - "${VLLM_CHEAP_GPU_UTIL:-0.90}"
      - "--max-model-len"
      - "${VLLM_MAX_MODEL_LEN:-8192}"
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

volumes:
  hotpotqa_vllm_cache: {}
